<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>历史操作 · 量化信号</title>
    <link rel="stylesheet" href="style.css">
    <script src="lib/md5.min.js"></script>
    <script src="lib/config.js"></script>
    <script src="lib/auth.js"></script>
    <script src="lib/data-loader.js"></script>
</head>
<body>
    <div class="quant-container">
        <div class="quant-header">
            <h1>历史操作</h1>
            <div>
                <a href="index.html">← 返回控制台</a>
                ·
                <a href="settings.html">设置</a>
            </div>
        </div>

        <div class="section">
            <h2>筛选</h2>
            <div style="display:flex;gap:10px;flex-wrap:wrap">
                <select id="f-bucket">
                    <option value="">全部 D/W/M</option>
                    <option value="D">仅 D</option>
                    <option value="W">仅 W</option>
                    <option value="M">仅 M</option>
                </select>
                <select id="f-action">
                    <option value="">全部 BUY/SELL</option>
                    <option value="BUY">仅 BUY</option>
                    <option value="SELL">仅 SELL</option>
                </select>
                <select id="f-status">
                    <option value="">全部状态</option>
                    <option value="pending">pending</option>
                    <option value="confirmed">confirmed</option>
                    <option value="skipped">skipped</option>
                    <option value="expired">expired</option>
                </select>
                <select id="f-index">
                    <option value="">全部指数</option>
                </select>
            </div>
        </div>

        <div class="section">
            <h2>历史信号 / 操作</h2>
            <div id="history-table"></div>
        </div>
    </div>

    <script>
        QuantAuth.gate({ onAuthorized: boot });

        var ALL = [];

        function boot() {
            QuantData.loadSignalsIndex().then(function (idx) {
                var dates = idx.entries.map(function (e) { return e.date; });
                return QuantData.loadSignalsForDates(dates);
            }).then(function (files) {
                ALL = [];
                files.forEach(function (f) {
                    (f.signals || []).forEach(function (s) { s._file_date = f.date; ALL.push(s); });
                });
                populateIndexFilter();
                attachListeners();
                render();
            });
        }

        function populateIndexFilter() {
            var indices = {};
            ALL.forEach(function (s) {
                var code = s.bucket_id.split('-')[0];
                indices[code] = true;
            });
            var sel = document.getElementById('f-index');
            Object.keys(indices).sort().forEach(function (c) {
                var opt = document.createElement('option');
                opt.value = c;
                opt.textContent = QuantConfig.nameOf(c) + ' (' + c + ')';
                sel.appendChild(opt);
            });
        }

        function attachListeners() {
            ['f-bucket', 'f-action', 'f-status', 'f-index'].forEach(function (id) {
                document.getElementById(id).addEventListener('change', render);
            });
        }

        function render() {
            var b = document.getElementById('f-bucket').value;
            var a = document.getElementById('f-action').value;
            var st = document.getElementById('f-status').value;
            var idx = document.getElementById('f-index').value;

            var filtered = ALL.filter(function (s) {
                if (b && !s.bucket_id.endsWith('-' + b)) return false;
                if (a && s.action !== a) return false;
                if (st && s.status !== st) return false;
                if (idx && !s.bucket_id.startsWith(idx + '-')) return false;
                return true;
            }).sort(function (x, y) { return (y._file_date || '').localeCompare(x._file_date || ''); });

            var html = '<table class="txs"><thead><tr><th>日期</th><th>指数</th><th>bucket</th><th>操作</th><th>触发条件</th><th>建议</th><th>实际</th><th>状态</th></tr></thead><tbody>';
            if (!filtered.length) {
                html += '<tr><td colspan="8" class="empty-state">无匹配记录</td></tr>';
            } else {
                filtered.forEach(function (s) {
                    var code = s.bucket_id.split('-')[0];
                    var freq = s.bucket_id.split('-')[1];
                    var actual = s.actual_shares ? (s.actual_shares + ' @¥' + s.actual_price) : '—';
                    html += '<tr>' +
                        '<td>' + s._file_date + '</td>' +
                        '<td>' + QuantConfig.nameOf(code) + '<span class="muted"> ' + code + '</span></td>' +
                        '<td>' + freq + '</td>' +
                        '<td><span class="state-' + (s.action === 'BUY' ? 'HOLD' : 'CASH') + '">' + s.action + '</span></td>' +
                        '<td>' + (s.trigger_condition || '—') + '</td>' +
                        '<td>' + s.suggested_shares + '</td>' +
                        '<td>' + actual + '</td>' +
                        '<td>' + s.status + (s.skip_reason ? ' (' + s.skip_reason + ')' : '') + '</td>' +
                    '</tr>';
                });
            }
            html += '</tbody></table>';
            document.getElementById('history-table').innerHTML = html;
        }
    </script>
</body>
</html>
