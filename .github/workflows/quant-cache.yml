name: Quant Cache + Reconcile (09:00) [reconcile only · cache update is mock-only]

on:
  workflow_dispatch:
    inputs:
      mock_now:
        description: 'Mock now (ISO 8601). Empty = real now.'
        required: false
        default: ''
  repository_dispatch:
    types:
      - quant-cache-trigger

permissions:
  contents: write

concurrency:
  group: quant-cache
  cancel-in-progress: false

jobs:
  cache-and-reconcile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyyaml pandas

      - name: Run reconcile (pending → expired)
        env:
          MOCK_NOW: ${{ github.event.inputs.mock_now }}
        run: |
          MOCK_NOW="${MOCK_NOW:-$(date -u +'%Y-%m-%dT%H:%M:%SZ')}"
          python -m scripts.quant.run_signal reconcile \
            --mock-now "$MOCK_NOW" \
            --writer-mode commit

      - name: 缓存增量更新（**MOCK ONLY**：本期 MVP 不联网，仅 placeholder）
        run: |
          echo "::warning::quant-cache 工作流的'缓存更新'部分为 MOCK ONLY，未连接 akshare。"
          echo "本期 MVP（mvp-plan.md §3.5.1）的本地走通模式：缓存来自 fixture / 手动 backfill。"
          echo "上线时机：mvp-plan §10 Phase 7 上线前，把本步骤改为调 akshare.stock_zh_index_hist_csindex 拉昨日数据 → 写 data/quant/cache/{code}.csv。"
          echo ""
          echo "当前已实现：reconcile (pending → expired) 真实运行（见上一步）"

      - name: Push
        run: |
          if [ "$(git rev-list HEAD ^origin/main --count)" -gt 0 ]; then
            git push origin main
          fi
