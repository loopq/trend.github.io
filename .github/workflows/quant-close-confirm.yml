name: Quant Close Confirm (15:30)

on:
  workflow_dispatch:
    inputs:
      mock_now:
        description: 'Mock now (ISO 8601). Empty = real now.'
        required: false
        default: ''
  repository_dispatch:
    types:
      - quant-close-confirm-trigger

permissions:
  contents: write

concurrency:
  group: quant-close-confirm
  cancel-in-progress: false

jobs:
  close-confirm:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyyaml pandas

      - name: Run close-confirm (provisional → final + policy_state 回正)
        env:
          MOCK_NOW: ${{ github.event.inputs.mock_now }}
        run: |
          MOCK_NOW="${MOCK_NOW:-$(date -u +'%Y-%m-%dT%H:%M:%SZ')}"
          python -m scripts.quant.run_signal close-confirm \
            --mock-now "$MOCK_NOW" \
            --realtime scripts/quant/tests/fixtures/realtime_2026-04-25.json \
            --writer-mode commit

      - name: Push
        run: |
          if [ "$(git rev-list HEAD ^origin/main --count)" -gt 0 ]; then
            git push origin main
          fi
