name: Quant Signal (14:48)

on:
  workflow_dispatch:
    inputs:
      mock_now:
        description: 'Mock now (ISO 8601, e.g. 2026-04-25T14:48:00+08:00). Empty = real now.'
        required: false
        default: ''
  repository_dispatch:
    types:
      - quant-signal-trigger

permissions:
  contents: write

concurrency:
  group: quant-signal
  cancel-in-progress: false

jobs:
  run-signal:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyyaml pandas

      - name: Run signal generator (本地走通模式: writer commit / notifier dry-run)
        env:
          MOCK_NOW: ${{ github.event.inputs.mock_now }}
        run: |
          set -e
          # 本期 MVP 用 fixture mock；上线时 --realtime 改为真实 AkShare 拉取脚本
          MOCK_NOW="${MOCK_NOW:-$(date -u +'%Y-%m-%dT%H:%M:%SZ')}"
          python -m scripts.quant.run_signal signal \
            --mock-now "$MOCK_NOW" \
            --calendar scripts/quant/tests/fixtures/trading_calendar_2026-04.json \
            --realtime scripts/quant/tests/fixtures/realtime_2026-04-25.json \
            --writer-mode commit \
            --notifier-mode dry_run

      - name: Push (only if commits made)
        run: |
          if [ "$(git rev-list HEAD ^origin/main --count)" -gt 0 ]; then
            git push origin main
          else
            echo "no new commits"
          fi
