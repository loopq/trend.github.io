# 量化信号系统配置（V9.2 基线，13 指数 / 36 有效 bucket）
# 详细设计见 docs/agents/quant/mvp-plan.md
# 基线快照来源：docs/agents/backtest/v9-summary.md 排名表

total_capital: 130000        # 总本金 13 万
per_index_capital: 10000     # 每指数 1 万

repo:
  owner: loopq
  name: trend.github.io
  branch: main

paths:
  # 数据放在 docs/data/quant，使其同时被 GitHub Pages 部署 + 前端可 fetch
  # 前端在 docs/quant/ 通过 ../data/quant/ 相对路径访问
  data_root: docs/data/quant
  positions: docs/data/quant/positions.json
  transactions: docs/data/quant/transactions.json
  signals_dir: docs/data/quant/signals
  signals_index: docs/data/quant/signals/index.json
  cache_dir: docs/data/quant/cache
  notify_outbox: docs/data/quant/notify-outbox

trigger:
  signal_time: "14:48"
  cache_update_time: "09:00"
  close_confirm_time: "15:30"
  timezone: "Asia/Shanghai"

paper_trading:
  enabled_until: "2026-05-09"
  mode: "auto_skip"   # auto_skip | manual_mock_confirm | off

slo:
  signals_written_p95_seconds: 120
  feishu_first_arrival_p95_seconds: 180
  feishu_all_arrival_p95_seconds: 240

notification:
  channel: feishu
  webhook_secret: FEISHU_WEBHOOK_URL
  retry:
    count: 3
    backoff_seconds: [5, 15, 45]
  fail_workflow_on_unrecoverable_failure: true

writer:
  default_mode: local      # local | github_api（local = 写文件 + git commit；github_api = Git Data API）

